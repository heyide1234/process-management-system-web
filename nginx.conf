# nginx.conf - 流程管理系统前端部署配置
# 使用方式：nginx -c /path/to/nginx.conf 或者放到 /etc/nginx/conf.d/ 目录

server {
    listen 80;
    server_name _;                     # 替换为实际域名或 IP

    root /opt/process-management-web;  # 替换为 dist 目录的实际路径
    index index.html;

    # ======== SPA 路由回退 ========
    # 所有非文件请求都落到 index.html，由 Vue Router 接管
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ======== Camunda Engine REST API 代理 ========
    # 生产环境建议指向内网 Camunda 地址
    location /engine-rest/ {
        proxy_pass http://__CAMUNDA_HOST__:8080;   # 部署时替换为 Camunda 实际地址
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加超时（BPMN 设计器操作可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        
        # 允许大文件上传（部署 BPMN / 表单）
        client_max_body_size 10m;
    }

    # ======== 自定义 API 代理（如有） ========
    location /api/ {
        proxy_pass http://__CAMUNDA_HOST__:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ======== 静态资源缓存 ========
    # JS/CSS 文件带 hash 名，可以长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ======== gzip 压缩 ========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
